<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Hệ Thống | NEXA Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nexaBlue: { DEFAULT: '#1b365d', light: '#2a4c7e', dark: '#0f2444' },
                        nexaPurple: { DEFAULT: '#4f46e5', light: '#6366f1', dark: '#3730a3' },
                        slateBg: '#f8fafc',
                        iuhGold: { DEFAULT: '#D4AF37' }
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slateBg font-sans text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden transition-all duration-300 hover:shadow-2xl">
        <div class="bg-gradient-to-r from-nexaBlue to-nexaBlue-light p-6 text-center relative">
            <div class="absolute top-3 right-4 flex items-center gap-1 bg-white/10 px-2 py-0.5 rounded-full border border-white/20">
                <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                <span class="text-[9px] text-white font-bold tracking-widest uppercase">V2.4 Stable</span>
            </div>
            <div class="w-12 h-12 bg-white/10 rounded-xl mx-auto flex items-center justify-center border border-white/20 backdrop-blur-sm mb-3">
                <i class="fa-solid fa-shield-halved text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-black text-white tracking-tight">NEXA</h1>
            <p class="text-[11px] text-slate-300 font-medium mt-1">Hệ thống Đăng nhập Khảo thí & Đánh giá Năng lực</p>
        </div>

        <div class="p-6 space-y-4">
            <div id="error-box" class="bg-rose-50 border border-rose-100 text-rose-600 text-xs p-3.5 rounded-xl hidden"></div>

            <div class="space-y-3.5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Tài khoản định danh</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs"><i class="fa-solid fa-user"></i></span>
                        <input id="login-id" type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-9 pr-4 text-xs font-semibold focus:outline-none focus:border-nexaBlue focus:bg-white transition-all" placeholder="Nhập mã số định danh hoặc email...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Mật khẩu bảo vệ</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs"><i class="fa-solid fa-lock"></i></span>
                        <input id="login-pass" type="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-9 pr-4 text-xs font-semibold focus:outline-none focus:border-nexaBlue focus:bg-white transition-all" placeholder="••••••••">
                    </div>
                </div>
            </div>

            <button onclick="handleNexaLogin()" class="w-full bg-nexaBlue hover:bg-nexaBlue-dark text-white font-bold py-2.5 rounded-xl border-none transition-all cursor-pointer shadow-md text-xs tracking-wide active:scale-[0.99] mt-2">
                XÁC THỰC TRUY CẬP <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>

            <div class="pt-4 border-t border-slate-100 text-center">
                <p class="text-xs text-slate-400 font-medium">Chưa kích hoạt không gian số cá nhân?</p>
                <a href="NEXA_Register.html" class="inline-block text-nexaPurple hover:text-nexaPurple-dark font-bold text-xs mt-1.5 transition-colors underline decoration-2">Đăng ký tài khoản mới ngay</a>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script>
        function handleNexaLogin() {
            const inputId = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const errorBox = document.getElementById('error-box');

            if (!inputId || !pass) {
                errorBox.innerHTML = 'Vui lòng cung cấp đầy đủ thông tin tài khoản và mật khẩu.';
                errorBox.classList.remove('hidden');
                return;
            }

            let finalRole = null;

            // 1. Kiểm tra tài khoản cứng (Mock static testing)
            if (pass === '123456') {
                if (inputId === 'student') finalRole = 'learner';
                else if (inputId === 'teacher') finalRole = 'teacher';
                else if (inputId === 'employer') finalRole = 'employer';
                else if (inputId === 'admin') finalRole = 'admin';
            }

            // 2. Nếu không trùng tài khoản cứng, kiểm tra tài khoản đăng ký trong LocalStorage qua file storage.js
            if (!finalRole && typeof NexaStorage !== 'undefined') {
                const savedUser = NexaStorage.getUserAccount();
                if (savedUser && (savedUser.username === inputId || savedUser.email === inputId) && savedUser.password === pass) {
                    finalRole = savedUser.role;
                }
            }

            // 3. Lưu phiên đăng nhập và chuyển hướng dashboard
            if (finalRole) {
                errorBox.classList.add('hidden');

                const mockProfiles = {
                    student:  { username: 'student',  email: 'student',  role: 'learner',  name: 'Sinh viên Demo' },
                    teacher:  { username: 'teacher',  email: 'teacher',  role: 'teacher',  name: 'Giảng viên Demo' },
                    employer: { username: 'employer', email: 'employer', role: 'employer', name: 'Doanh nghiệp Demo' },
                    admin:    { username: 'admin',    email: 'admin',    role: 'admin',    name: 'Quản trị viên' }
                };

                if (typeof NexaStorage !== 'undefined') {
                    const savedUser = NexaStorage.getUserAccount();
                    const isRegisteredLogin = savedUser &&
                        (savedUser.username === inputId || savedUser.email === inputId) &&
                        savedUser.password === pass;
                    const profileToSave = isRegisteredLogin ? savedUser : (mockProfiles[inputId] || {
                        username: inputId, email: inputId, role: finalRole, name: inputId
                    });
                    NexaStorage.saveUserAccount(profileToSave);
                }

                const dashboardPaths = {
                    learner:  'dashboard_learner/dashboard_learner.html',
                    teacher:  'dashboard_teacher/dashboard_teacher.html',
                    employer: 'dashboard_employer/dashboard_employer.html',
                    admin:    'dashboard_admin/dashboard_admin.html'
                };
                window.location.href = dashboardPaths[finalRole];
            } else {
                errorBox.innerHTML = `Thông tin đăng nhập hoặc mật khẩu bảo vệ không chính xác.<br/>
                <span class="text-[10px] font-medium opacity-80 mt-1 block">💡 Gợi ý kiểm thử nhanh 4 luồng hệ thống (Mật khẩu: <b>123456</b>):<br/>
                - Sinh viên: <b class="text-nexaPurple">student</b> | Giảng viên: <b class="text-nexaPurple">teacher</b><br/>
                - Doanh nghiệp: <b class="text-nexaPurple">employer</b> | Admin tối cao: <b class="text-nexaPurple">admin</b></span>`;
                errorBox.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
