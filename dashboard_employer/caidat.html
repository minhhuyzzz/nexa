<body class="bg-surface-muted text-on-surface font-body-md min-h-screen">
<!-- TopNavBar -->
<nav class="fixed top-0 right-0 w-[calc(100%-16rem)] z-40 bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-md border-b border-border-subtle dark:border-outline flex justify-between items-center h-16 px-8 ml-64">
<div>
<!-- Search placeholder if needed -->
</div>
<div class="flex items-center space-x-4">
<button class="text-on-surface-variant dark:text-surface-variant hover:text-primary dark:hover:text-inverse-primary transition-opacity opacity-80 active:opacity-100">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-on-surface-variant dark:text-surface-variant hover:text-primary dark:hover:text-inverse-primary transition-opacity opacity-80 active:opacity-100">
<span class="material-symbols-outlined">language</span>
</button>
<button class="text-on-surface-variant dark:text-surface-variant hover:text-primary dark:hover:text-inverse-primary transition-opacity opacity-80 active:opacity-100">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</nav>
<!-- SideNavBar -->
<script src="../js/sidebar_employer.js"></script>
<!-- Main Content -->
<main class="ml-64 pt-24 px-container-padding pb-section-margin">
<div class="max-w-4xl mx-auto space-y-card-gap">
<header class="mb-8">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Cài đặt Tài khoản</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Quản lý thông tin doanh nghiệp, bảo mật và tùy chọn thông báo.</p>
</header>
<div class="grid grid-cols-1 md:grid-cols-3 gap-card-gap">
<!-- Navigation within settings -->
<div class="md:col-span-1">
<div class="bg-surface rounded-lg shadow-sm border border-border-subtle overflow-hidden">
<ul class="flex flex-col">
<li><a class="block px-4 py-3 font-label-md text-label-md text-primary bg-primary-fixed/30 border-l-4 border-primary" href="#">Thông tin doanh nghiệp</a></li>
<li><a class="block px-4 py-3 font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low" href="#">Tài khoản &amp; Bảo mật</a></li>
<li><a class="block px-4 py-3 font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low" href="#">Thông báo</a></li>
<li><a class="block px-4 py-3 font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low" href="#">Quyền riêng tư</a></li>
</ul>
</div>
</div>
<!-- Forms -->
<div class="md:col-span-2 space-y-card-gap">
<!-- Company Profile Form -->
<section class="bg-surface rounded-lg shadow-sm border border-border-subtle p-6">
<h3 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-6 border-b border-border-subtle pb-4">Thông tin Doanh nghiệp</h3>
<div class="flex items-center space-x-6 mb-8">
<div class="w-24 h-24 rounded-lg bg-surface-container flex items-center justify-center overflow-hidden border border-border-subtle">
<span class="material-symbols-outlined text-4xl text-on-surface-variant">apartment</span>
</div>
<div>
<button class="px-4 py-2 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary/90 transition-colors">Tải lên Logo mới</button>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-2">JPG, GIF hoặc PNG. Tối đa 1MB.</p>
</div>
</div>
<form class="space-y-4">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="companyName">Tên Doanh nghiệp</label>
<input class="w-full rounded-lg border-border-subtle bg-surface focus:border-employer-accent focus:ring-1 focus:ring-employer-accent text-on-surface p-2.5" id="companyName" type="text" value="TechNova Solutions"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="website">Website</label>
<input class="w-full rounded-lg border-border-subtle bg-surface focus:border-employer-accent focus:ring-1 focus:ring-employer-accent text-on-surface p-2.5" id="website" type="url" value="https://technova.example.com"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="description">Mô tả ngắn</label>
<textarea class="w-full rounded-lg border-border-subtle bg-surface focus:border-employer-accent focus:ring-1 focus:ring-employer-accent text-on-surface p-2.5" id="description" rows="4">TechNova Solutions là công ty hàng đầu trong lĩnh vực phát triển phần mềm và AI, tập trung vào các giải pháp doanh nghiệp đổi mới sáng tạo.</textarea>
</div>
<div class="flex justify-end pt-4">
<button class="px-6 py-2 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary/90 transition-colors" type="button">Lưu thay đổi</button>
</div>
</form>
</section>
</div>
</div>
</div>
</main>
